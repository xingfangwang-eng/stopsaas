<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .og-image {
      width: 1200px;
      height: 630px;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      border: 1px solid #333;
    }
    h1 {
      font-size: 80px;
      font-weight: 900;
      text-align: center;
      margin: 0 40px;
      line-height: 1.2;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 32px;
      font-weight: 500;
      text-align: center;
      margin-top: 40px;
      color: #6366f1;
      margin: 40px 40px 0;
    }
  </style>
</head>
<body>
  <div class="og-image">
    <h1>STOP PAYING FOR SAAS</h1>
    <div class="subtitle">Paste your SaaS regret, get a free DIY alternative in 2 seconds</div>
  </div>
</body>
</html>
